<svg width="100%" viewBox="0 0 680 270" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="260" fill="#08111e" rx="6" style="fill:rgb(8, 17, 30);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

