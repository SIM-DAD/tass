  <text x="274" y="192" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#3d5872" letter-spacing="0.5" style="fill:rgb(61, 88, 114);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Helvetica Neue&quot;, Helvetica, Arial, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">Professional-grade NLP. No code required.</text>
